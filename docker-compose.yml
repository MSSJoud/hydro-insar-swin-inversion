services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hydro-insar-swin-inversion:0.1.0
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ./data:/data
      - ./outputs:/workspace/outputs
    stdin_open: true
    tty: true

  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: hydro-insar-swin-inversion:0.1.0
    working_dir: /workspace
    command:
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --NotebookApp.token=
    ports:
      - "8888:8888"
    volumes:
      - ./:/workspace
      - ./data:/data
      - ./outputs:/workspace/outputs

